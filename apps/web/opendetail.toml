version = 1

[[content]]
include = ["content/docs/**/*.md", "content/docs/**/*.mdx"]
exclude = []
public_path = "/docs"

[[content]]
public_path = "/"
include = ["content/marketing/**/*.mdx"]
exclude = []

[media]
include = ["content/**/*.{png,jpg,jpeg,webp,avif,gif,svg}"]
exclude = []
public_path = "/content-media"

# Remote resources: OpenAI web search limited to the live site (apex + www).
# Add [fetch.file_search] with vector_store_ids for OpenAI vector stores.
[fetch.web_search]
allowed_domains = ["opendetail.dev", "www.opendetail.dev"]
search_context_size = "medium"
